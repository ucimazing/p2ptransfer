# Upstream — Go server with keepalive for relay performance
upstream fasttransfer_app {
    server fasttransfer:8080;
    keepalive 32;
}

# HTTP server (used before SSL is set up, and for ACME challenge)
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything to Go server (works without SSL for testing)
    location /ws {
        proxy_pass http://fasttransfer_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # High-speed WebSocket relay — maximum throughput config
    location /ws-relay {
        proxy_pass http://fasttransfer_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable all buffering — direct passthrough
        proxy_buffering off;
        proxy_request_buffering off;

        # Large buffers for WebSocket frames
        proxy_buffer_size 512k;
        proxy_buffers 16 512k;
        proxy_busy_buffers_size 1m;
    }

    location / {
        proxy_pass http://fasttransfer_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

