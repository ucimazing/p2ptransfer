# Coturn TURN server configuration for FastTransfer
# Enables WebRTC for users behind strict NATs (~15% of connections)

# Network
listening-port=3478
tls-listening-port=5349

# External IP is auto-detected by the setup script
# The deploy script will replace this line with your server's public IP
external-ip=EXTERNAL_IP_PLACEHOLDER

# Authentication — use static auth secret (simpler than per-user credentials)
# The server and client share this secret to generate time-limited credentials
use-auth-secret
static-auth-secret=2e2ef44f4d93a7e55afd585f06695060eaeeafa7044932d1
realm=fasttransfer

# TLS — Let's Encrypt certs (auto-configured by setup script)
# cert=/etc/letsencrypt/live/DOMAIN/fullchain.pem
# pkey=/etc/letsencrypt/live/DOMAIN/privkey.pem

# Performance
relay-threads=4
total-quota=200
max-bps=0
no-multicast-peers

# Logging
log-file=/var/log/turnserver.log
simple-log
no-stdout-log

# Security
no-cli
fingerprint
stale-nonce=600

# Relay port range (open in firewall)
min-port=49152
max-port=49252
