services:
  # FastTransfer Go server
  fasttransfer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"   # HTTP (internal, proxied by nginx)
      - "9800:9800"   # TCP relay for CLI
    environment:
      - PORT=8080
      - RELAY_PORT=9800
      - TURN_SECRET=2e2ef44f4d93a7e55afd585f06695060eaeeafa7044932d1
      - TURN_HOST=${TURN_HOST:-}
    restart: unless-stopped
    networks:
      - ft-network

  # Coturn TURN server for WebRTC NAT traversal
  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - fasttransfer
    restart: unless-stopped
    networks:
      - ft-network

  # Certbot for SSL certificate renewal
  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  letsencrypt:
  certbot-www:

networks:
  ft-network:
    driver: bridge
